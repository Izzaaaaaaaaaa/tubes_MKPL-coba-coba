name: Python FastAPI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  inspect:
    name: Continuous Inspection (Lint, Type, Security)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ruff Format Check
      run: ruff format --check .

    - name: Run Ruff Linter
      run: ruff check .

    - name: Run Mypy (Type Check)
      run: mypy app

    - name: Run Bandit (Security Check)
      run: bandit -r app

  test:
    name: Continuous Testing (Pytest & Coverage)
    needs: inspect
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests with Coverage
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing

    - name: Enforce Coverage Threshold (80%)
      run: |
        pip install coverage
        coverage report --fail-under=80

  deploy:
    name: Continuous Delivery & Deployment
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image Locally (Verification)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: fastapi-todo-app:latest

    # --- SIMULATED DEPLOYMENT / DELIVERY ---
